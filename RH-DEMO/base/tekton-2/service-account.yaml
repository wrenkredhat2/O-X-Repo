apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-triggers-runner-role
  namespace: camel-routes
rules:
  # Allow creating the actual builds
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["create", "get", "list", "watch"]
  # Allow the trigger to read its own configuration
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["triggerbindings", "triggertemplates", "eventlisteners"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-triggers-runner-binding
  namespace: camel-routes
subjects:
  - kind: ServiceAccount
    name: pipeline  # <--- Change this if your EventListener uses a different SA
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tekton-triggers-runner-role