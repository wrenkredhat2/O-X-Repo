apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: example-kc
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgres-db
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  hostname:
    hostname: test.keycloak.org
  additionalOptions:
    - name: http-relative-path
      value: /auth
    - name: http-enabled
      value: "true"
  ingress:
    enabled: true