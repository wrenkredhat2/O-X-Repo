apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kafka-streams

resources:
  - rolebinding.yaml
  - ../../../kafka-streams/base

patches:

  - target:
      kind: Kafka
      name: orl-clust
    patch: |-
      - op: replace
        path: /spec/kafka/listeners/0/configuration/bootstrap/host
        value: "orl-clust-kafka-listener1-bootstrap-kafka-streams.apps.cluster-492gk.492gk.sandbox2076.opentlc.com"

